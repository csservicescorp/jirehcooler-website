# Pages CMS configuration (https://pagescms.org)
# Organizes editable content into a client-friendly editor. Anything not
# listed here (layout, components, CSS, Astro config) stays code-only.

media:
  input: public/images
  output: /images

content:
  # ---------------------------------------------------------------------
  # WEBSITE SETTINGS
  # ---------------------------------------------------------------------
  - name: settings
    label: "Website Settings"
    type: file
    path: src/data/site.json
    format: json
    fields:
      - { name: businessName, label: "Business Name", type: string }
      - { name: legalName, label: "Legal Business Name", type: string }
      - { name: tagline, label: "Tagline", type: string }
      - { name: shortTagline, label: "Short Tagline", type: string }
      - { name: foundedYear, label: "Founded Year", type: number }
      - { name: phone, label: "Phone (display format)", type: string, description: "e.g. (954) 426-6010" }
      - { name: phoneRaw, label: "Phone (dialing format)", type: string, description: "e.g. +19544266010, used in call links" }
      - { name: email, label: "Business Email", type: string }
      - name: address
        label: "Address"
        type: object
        fields:
          - { name: street, label: "Street", type: string }
          - { name: city, label: "City", type: string }
          - { name: state, label: "State", type: string }
          - { name: zip, label: "ZIP Code", type: string }
          - { name: full, label: "Full Address (display)", type: string }
      - name: license
        label: "License Information"
        type: object
        fields:
          - { name: label, label: "License Label", type: string }
          - { name: number, label: "License Number", type: string }
      - name: hours
        label: "Business Hours"
        type: object
        fields:
          - { name: office, label: "Office Hours", type: string }
          - { name: emergency, label: "Emergency Hours Statement", type: string }
      - { name: emergencyAvailability, label: "Emergency Availability Badge", type: string, description: "e.g. 24/7/365" }
      - name: logo
        label: "Company Logo"
        type: object
        fields:
          - { name: image, label: "Logo File", type: image, description: "Used in the header and footer. Upload a transparent PNG for best results — recommended at least 900×380px (roughly 2.4:1, wide format). The logo is never cropped, only scaled." }
          - { name: alt, label: "Logo Alt Text", type: string, description: "Read by screen readers, e.g. \"Jireh Cooler Air Conditioning logo\"." }
      - name: social
        label: "Social Links"
        type: object
        fields:
          - { name: facebook, label: "Facebook URL", type: string }
          - { name: instagram, label: "Instagram URL", type: string }
          - { name: youtube, label: "YouTube URL", type: string }
      - { name: googleProfileUrl, label: "Google Business Profile URL", type: string, description: "Used for the \"Read More Reviews on Google\" and \"Leave Us a Review\" buttons on the Reviews page and homepage." }
      - name: whatsapp
        label: "WhatsApp"
        type: object
        fields:
          - { name: enabled, label: "Show WhatsApp Button", type: boolean }
          - { name: number, label: "WhatsApp Number", type: string }
      - { name: serviceAreaSummary, label: "Service Area Summary", type: string }
      - name: headerCta
        label: "Header Estimate Button"
        type: object
        fields:
          - { name: label, label: "Button Label", type: string }
          - { name: href, label: "Button Link", type: string }
      - name: callCta
        label: "Header Call Button"
        type: object
        fields:
          - { name: label, label: "Button Label", type: string }
          - { name: href, label: "Button Link", type: string }

  # ---------------------------------------------------------------------
  # SEO
  # ---------------------------------------------------------------------
  - name: seo
    label: "SEO"
    type: file
    path: src/data/site.json
    format: json
    fields:
      - { name: ogImage, label: "Default Social Sharing Image", type: image, description: "Shown when a page is shared on Facebook, Instagram, or text messages, if that page doesn't have its own custom image. Recommended: exactly 1200×630px." }

  # ---------------------------------------------------------------------
  # HOMEPAGE
  # ---------------------------------------------------------------------
  - name: homepage
    label: "Homepage"
    type: file
    path: src/data/homepage.json
    format: json
    fields:
      - name: hero
        label: "Hero Section"
        type: object
        fields:
          - { name: eyebrow, label: "Eyebrow Text", type: string }
          - { name: headline, label: "Headline", type: string }
          - { name: subheadline, label: "Subheadline", type: text }
          - { name: image, label: "Hero Image", type: image, description: "The large photo on the homepage. Recommended: at least 1600×2000px, portrait-friendly (a technician at work, a nice property, etc). This is the first thing visitors see — keep it high quality." }
          - { name: imageAlt, label: "Hero Image Alt Text", type: string, description: "Describe what's in the photo for screen readers and search engines, e.g. \"Technician repairing an outdoor AC unit\"." }
          - name: primaryCta
            label: "Primary Button"
            type: object
            fields:
              - { name: label, label: "Label", type: string }
              - { name: href, label: "Link", type: string }
          - name: secondaryCta
            label: "Secondary Button"
            type: object
            fields:
              - { name: label, label: "Label", type: string }
              - { name: href, label: "Link", type: string }
      - name: pathways
        label: "Residential / Commercial Pathways"
        type: object
        fields:
          - { name: heading, label: "Section Heading", type: string }
          - name: residential
            label: "Residential Card"
            type: object
            fields:
              - { name: label, label: "Label", type: string }
              - { name: description, label: "Description", type: text }
              - { name: href, label: "Link", type: string }
              - { name: image, label: "Photo", type: image, description: "Recommended: at least 1200×750px (16:10), landscape. A residential home or house exterior works well here." }
              - { name: imageAlt, label: "Photo Alt Text", type: string }
          - name: commercial
            label: "Commercial Card"
            type: object
            fields:
              - { name: label, label: "Label", type: string }
              - { name: description, label: "Description", type: text }
              - { name: href, label: "Link", type: string }
              - { name: image, label: "Photo", type: image, description: "Recommended: at least 1200×750px (16:10), landscape. A commercial building or rooftop unit works well here." }
              - { name: imageAlt, label: "Photo Alt Text", type: string }
      - name: trust
        label: "Trust Section"
        type: object
        fields:
          - { name: heading, label: "Heading", type: string }
          - { name: subheading, label: "Subheading", type: text }
          - { name: image, label: "Photo", type: image, description: "Recommended: at least 1200×950px, landscape. A real company/fleet photo works best here to back up the credibility message." }
          - { name: imageAlt, label: "Photo Alt Text", type: string }
          - name: points
            label: "Trust Points"
            type: array
            fields:
              - { name: label, label: "Label", type: string }
              - { name: description, label: "Description", type: text }
      - name: whyChooseUs
        label: "Why Choose Us Section"
        type: object
        fields:
          - { name: heading, label: "Heading", type: string }
          - name: points
            label: "Points"
            type: array
            fields:
              - { name: label, label: "Label", type: string }
              - { name: description, label: "Description", type: text }
      - name: emergency
        label: "Emergency Section"
        type: object
        fields:
          - { name: heading, label: "Heading", type: string }
          - { name: description, label: "Description", type: text }
          - { name: image, label: "Photo", type: image, description: "Full-width background photo behind this section's text. Recommended: at least 1920×1080px (16:9), landscape. Text is overlaid on a dark tint, so photos with some open space work best." }
          - { name: imageAlt, label: "Photo Alt Text", type: string }
      - name: membership
        label: "Maintenance Membership Section"
        type: object
        fields:
          - { name: heading, label: "Heading", type: string }
          - { name: description, label: "Description", type: text }
          - { name: highlights, label: "Highlights", type: array, list: { type: string } }
          - { name: image, label: "Photo", type: image, description: "Recommended: at least 1200×900px (4:3). A technician performing maintenance/inspection work fits this section." }
          - { name: imageAlt, label: "Photo Alt Text", type: string }
      - name: financing
        label: "Financing Section"
        type: object
        fields:
          - { name: heading, label: "Heading", type: string }
          - { name: description, label: "Description", type: text }
          - { name: image, label: "Photo", type: image, description: "Recommended: at least 1200×900px (4:3). A home or neighborhood photo works well here." }
          - { name: imageAlt, label: "Photo Alt Text", type: string }
      - name: airQuality
        label: "Indoor Air Quality Section"
        type: object
        fields:
          - { name: heading, label: "Heading", type: string }
          - { name: description, label: "Description", type: text }
          - { name: image, label: "Photo", type: image, description: "Recommended: at least 1200×900px (4:3). A clean, bright interior works well here." }
          - { name: imageAlt, label: "Photo Alt Text", type: string }
      - name: finalCta
        label: "Final Call-to-Action Section"
        type: object
        fields:
          - { name: heading, label: "Heading", type: string }
          - { name: description, label: "Description", type: text }
          - { name: backgroundImage, label: "Background Photo (optional)", type: image, description: "Optional full-width background photo behind the final call-to-action, with a dark blue tint applied automatically. Recommended: at least 1920×1080px (16:9). Leave blank for a plain blue background." }
          - { name: backgroundImageAlt, label: "Background Photo Alt Text", type: string }

  # ---------------------------------------------------------------------
  # SERVICES
  # ---------------------------------------------------------------------
  - name: services
    label: "Services"
    type: collection
    path: src/content/services
    format: yaml-frontmatter
    filename: "{fields.urlSlug}.md"
    fields:
      - { name: title, label: "Service Name", type: string }
      - { name: urlSlug, label: "URL Slug", type: string, description: "e.g. ac-repair — determines the page URL /ac-repair/" }
      - { name: category, label: "Category", type: select, options: { values: [residential, commercial, both] } }
      - { name: shortDescription, label: "Short Description", type: text, description: "Used on cards and in search results" }
      - { name: icon, label: "Icon Identifier", type: string, description: "Matches an icon in the site's icon set" }
      - { name: image, label: "Photo", type: image, description: "Recommended: at least 1400×1000px, landscape or portrait both work. Shown at the top of this service's page." }
      - { name: imageAlt, label: "Photo Alt Text", type: string, description: "Describe what's in the photo, e.g. \"Technician using a manifold gauge on an outdoor AC unit\"." }
      - { name: benefits, label: "Benefits List", type: array, list: { type: string } }
      - { name: ctaLabel, label: "Call-to-Action Label", type: string }
      - { name: seoTitle, label: "SEO Title", type: string }
      - { name: metaDescription, label: "Meta Description", type: text }
      - { name: published, label: "Published", type: boolean }
      - { name: featured, label: "Featured on Homepage", type: boolean }
      - { name: order, label: "Sort Order", type: number }
      - { name: body, label: "Full Description", type: rich-text }

  # ---------------------------------------------------------------------
  # ABOUT
  # ---------------------------------------------------------------------
  - name: about
    label: "About Page"
    type: file
    path: src/data/about.json
    format: json
    fields:
      - { name: seoTitle, label: "SEO Title", type: string }
      - { name: metaDescription, label: "Meta Description", type: text }
      - { name: heading, label: "Page Heading", type: string }
      - { name: intro, label: "Intro Paragraph", type: text }
      - { name: story, label: "Story Paragraphs", type: array, list: { type: text } }
      - name: values
        label: "Company Values"
        type: array
        fields:
          - { name: label, label: "Label", type: string }
          - { name: description, label: "Description", type: text }
      - { name: image, label: "Primary Photo", type: image, description: "Recommended: at least 1100×1400px, portrait orientation. A team or owner portrait fits well here — shown at the top of the page." }
      - { name: imageAlt, label: "Primary Photo Alt Text", type: string }
      - { name: secondaryHeading, label: "Secondary Section Heading", type: string }
      - { name: secondaryText, label: "Secondary Section Text", type: text }
      - { name: secondaryImage, label: "Secondary Photo", type: image, description: "Recommended: at least 1200×1200px, square or landscape. A storytelling photo (planning, teamwork, a job in progress) — shown further down the page." }
      - { name: secondaryImageAlt, label: "Secondary Photo Alt Text", type: string }

  # ---------------------------------------------------------------------
  # MAINTENANCE
  # ---------------------------------------------------------------------
  - name: maintenance
    label: "Maintenance Pages"
    type: file
    path: src/data/maintenance.json
    format: json
    fields:
      - name: membership
        label: "V.I.P. Maintenance Membership Page"
        type: object
        fields:
          - { name: seoTitle, label: "SEO Title", type: string }
          - { name: metaDescription, label: "Meta Description", type: text }
          - { name: heading, label: "Heading", type: string }
          - { name: intro, label: "Intro", type: text }
          - { name: included, label: "What's Included", type: array, list: { type: string } }
          - { name: note, label: "Note / Disclaimer", type: text }
          - { name: image, label: "Photo", type: image, description: "Recommended: at least 1200×900px (4:3). A technician performing maintenance work fits this page." }
          - { name: imageAlt, label: "Photo Alt Text", type: string }
      - name: preventive
        label: "Preventive Maintenance Page"
        type: object
        fields:
          - { name: seoTitle, label: "SEO Title", type: string }
          - { name: metaDescription, label: "Meta Description", type: text }
          - { name: heading, label: "Heading", type: string }
          - { name: intro, label: "Intro", type: text }
          - name: benefits
            label: "Benefits"
            type: array
            fields:
              - { name: label, label: "Label", type: string }
              - { name: description, label: "Description", type: text }
          - { name: image, label: "Photo", type: image, description: "Recommended: at least 1200×900px (4:3)." }
          - { name: imageAlt, label: "Photo Alt Text", type: string }

  # ---------------------------------------------------------------------
  # FINANCING
  # ---------------------------------------------------------------------
  - name: financing
    label: "Financing Page"
    type: file
    path: src/data/financing.json
    format: json
    fields:
      - { name: seoTitle, label: "SEO Title", type: string }
      - { name: metaDescription, label: "Meta Description", type: text }
      - { name: heading, label: "Heading", type: string }
      - { name: intro, label: "Intro", type: text }
      - name: highlights
        label: "Highlights"
        type: array
        fields:
          - { name: label, label: "Label", type: string }
          - { name: description, label: "Description", type: text }
      - { name: disclaimer, label: "Disclaimer", type: text }
      - { name: image, label: "Photo", type: image, description: "Recommended: at least 1200×900px (4:3). A technician consulting with a homeowner works well here." }
      - { name: imageAlt, label: "Photo Alt Text", type: string }

  # ---------------------------------------------------------------------
  # GALLERY
  # ---------------------------------------------------------------------
  - name: gallery
    label: "Gallery"
    type: collection
    path: src/content/gallery
    format: json
    fields:
      - { name: title, label: "Title", type: string }
      - { name: image, label: "Photo", type: image, description: "Recommended: at least 1000×750px. Square-ish or landscape photos work best in the gallery grid." }
      - { name: alt, label: "Alt Text", type: string, description: "Describe what's in the photo — helps accessibility and search engines." }
      - { name: category, label: "Category", type: select, options: { values: [residential, commercial, installation, repair, maintenance] } }
      - { name: published, label: "Published", type: boolean }

  # ---------------------------------------------------------------------
  # CUSTOMER REVIEWS
  # ---------------------------------------------------------------------
  - name: testimonials
    label: "Customer Reviews"
    description: >-
      Add only authentic reviews you are authorized to display (e.g. copied
      from your Google Business Profile with the customer's original wording).
      Do not invent reviewer names, ratings, dates, or review text, and do not
      reword or change the meaning of a customer's review. Use "Add an entry"
      to add a new review, and the trash icon on an entry to remove one.
    type: collection
    path: src/content/testimonials
    format: json
    fields:
      - { name: reviewerName, label: "Reviewer Name", type: string, description: "The customer's name exactly as it appears on the original review." }
      - { name: rating, label: "Star Rating (1-5)", type: number, description: "Whole number from 1 to 5, matching the original review's rating." }
      - { name: reviewText, label: "Review Text", type: text, description: "Copy the customer's original wording exactly — do not edit or rephrase it." }
      - { name: reviewDate, label: "Review Date", type: date, description: "Optional. The date the review was originally posted, if known." }
      - { name: sourceLabel, label: "Source Label", type: string, description: "Shown on the review card, e.g. \"Originally posted on Google\"." }
      - { name: sourceUrl, label: "Source Link (optional)", type: string, description: "Optional direct link to this specific review. If left blank, the review links to the main Google Business Profile." }
      - { name: published, label: "Published", type: boolean, description: "Turn off to hide this review from the site without deleting it." }
      - { name: featured, label: "Featured on Homepage", type: boolean, description: "Check to include this review in the homepage's \"Customer Stories\" section (shows up to 3)." }
      - { name: displayOrder, label: "Display Order", type: number, description: "Lower numbers appear first. Use this to control the order reviews are shown in." }

  # ---------------------------------------------------------------------
  # FAQS
  # ---------------------------------------------------------------------
  - name: faqs
    label: "FAQs"
    type: collection
    path: src/content/faqs
    format: json
    fields:
      - { name: question, label: "Question", type: string }
      - { name: answer, label: "Answer", type: text }
      - { name: category, label: "Category", type: select, options: { values: [general, repair, installation, maintenance, financing, emergency] } }
      - { name: order, label: "Sort Order", type: number }

  # ---------------------------------------------------------------------
  # SERVICE AREAS
  # ---------------------------------------------------------------------
  - name: serviceAreas
    label: "Service Areas"
    type: collection
    path: src/content/serviceAreas
    format: json
    fields:
      - { name: city, label: "City", type: string }
      - { name: county, label: "County", type: select, options: { values: [Broward, "Palm Beach"] } }
      - { name: published, label: "Published", type: boolean }

  # ---------------------------------------------------------------------
  # CONTACT
  # ---------------------------------------------------------------------
  - name: contact-settings
    label: "Contact Info"
    type: file
    path: src/data/site.json
    format: json
    fields:
      - { name: phone, label: "Phone (display format)", type: string }
      - { name: email, label: "Business Email", type: string }
      - name: address
        label: "Address"
        type: object
        fields:
          - { name: full, label: "Full Address (display)", type: string }
      - name: hours
        label: "Business Hours"
        type: object
        fields:
          - { name: office, label: "Office Hours", type: string }
          - { name: emergency, label: "Emergency Hours Statement", type: string }
